<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script>
(function(){
  function toThumb(v){
    if(typeof v!=='string'||!v.includes('drive.google.com'))return v;
    var m=v.match(/id=([a-zA-Z0-9_-]+)/)||v.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if(m&&m[1])return'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w1000';
    return v;
  }
  var origSet=Object.getOwnPropertyDescriptor(HTMLImageElement.prototype,'src').set;
  Object.defineProperty(HTMLImageElement.prototype,'src',{
    set:function(v){origSet.call(this,toThumb(v));},
    get:Object.getOwnPropertyDescriptor(HTMLImageElement.prototype,'src').get
  });
  var origAttr=Element.prototype.setAttribute;
  Element.prototype.setAttribute=function(n,v){
    if(this.tagName==='IMG'&&n.toLowerCase()==='src')v=toThumb(v);
    origAttr.call(this,n,v);
  };
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>慧燈中學 畢業巡禮</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Press+Start+2P&display=swap');
:root{
  --gold:#f0c040;--dark:#1a1a2e;--cream:#fdf6e3;--brown:#8b5e3c;
  --green:#2d5a27;--red:#c0392b;--blue:#2980b9;--purple:#7c3aed;
  --panel:rgba(12,8,2,0.97);--border:3px solid #f0c040;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Noto Serif TC',serif;overflow:hidden;height:100vh;width:100vw;}

#titlebar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--dark);border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:100;gap:8px;}
.logo{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);text-shadow:2px 2px 0 var(--brown);white-space:nowrap;}
#progress-bar{display:flex;gap:3px;flex-shrink:0;}
.pdot{width:8px;height:8px;border:2px solid rgba(240,192,64,0.2);background:transparent;transition:all 0.5s;border-radius:1px;}
.pdot.done{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px var(--gold);}
#gear-btn{background:transparent;border:2px solid var(--gold);color:var(--gold);font-size:13px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

#map-wrapper{position:fixed;top:48px;bottom:0;left:0;right:0;overflow:hidden;background:#000;}
#map-container{position:relative;transform-origin:0 0;cursor:grab;will-change:transform;user-select:none;}
#map-container.grabbing{cursor:grabbing;}
#campus-map{display:block;image-rendering:pixelated;position:relative;z-index:1;}
#mask-canvas{position:absolute;top:0;left:0;z-index:2;pointer-events:none;}

/* Clickable hit zones */
.hit-zone{
  position:absolute;z-index:4;pointer-events:none;cursor:pointer;
  border-radius:4px;transition:box-shadow 0.3s;
}
.hit-zone.unlocked{
  pointer-events:all;
  box-shadow:0 0 0 3px rgba(240,192,64,0.9),0 0 20px 4px rgba(240,192,64,0.3);
  animation:gold-breathe 2.5s ease-in-out infinite;
}
.hit-zone.done{
  pointer-events:all;
  box-shadow:0 0 0 3px rgba(76,175,80,0.9),0 0 18px 4px rgba(76,175,80,0.3);
  animation:green-breathe 3s ease-in-out infinite;
}
@keyframes gold-breathe{
  0%,100%{box-shadow:0 0 0 3px rgba(240,192,64,0.8),0 0 16px 3px rgba(240,192,64,0.25);}
  50%    {box-shadow:0 0 0 4px rgba(240,192,64,1),  0 0 32px 8px rgba(240,192,64,0.5);}
}
@keyframes green-breathe{
  0%,100%{box-shadow:0 0 0 3px rgba(76,175,80,0.8),0 0 14px 3px rgba(76,175,80,0.25);}
  50%    {box-shadow:0 0 0 4px rgba(76,175,80,1),  0 0 28px 6px rgba(76,175,80,0.5);}
}

/* SIDE PANEL */
#side-panel{position:fixed;top:48px;right:0;width:340px;height:calc(100vh - 48px);background:var(--panel);border-left:var(--border);transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.23,1,0.32,1);z-index:300;overflow-y:auto;display:flex;flex-direction:column;}
#side-panel.open{transform:translateX(0);}
#panel-header{padding:16px;position:relative;border-bottom:var(--border);background:linear-gradient(135deg,var(--brown),#5a3a1a);}
#panel-close{position:absolute;top:12px;right:12px;width:28px;height:28px;background:var(--red);border:2px solid var(--gold);color:white;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#panel-stage{font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(240,192,64,0.7);margin-bottom:6px;}
#panel-title{font-size:20px;font-weight:900;color:var(--cream);line-height:1.3;}
#panel-location{font-size:12px;color:var(--gold);margin-top:4px;}
#panel-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:14px;}
.slabel{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);letter-spacing:1px;margin-bottom:6px;opacity:0.7;}
.task-box{background:rgba(45,90,39,0.2);border:2px solid #4caf50;padding:12px;font-size:13px;color:#c8e6c9;line-height:1.8;white-space:pre-line;}
.theme-tag{display:inline-block;background:var(--brown);border:2px solid var(--gold);color:var(--gold);padding:4px 10px;font-family:'Press Start 2P',monospace;font-size:7px;}
.class-filter{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.cf-btn{padding:3px 8px;background:transparent;border:1.5px solid rgba(240,192,64,0.3);color:rgba(240,192,64,0.5);font-size:10px;cursor:pointer;font-family:'Noto Serif TC',serif;transition:all 0.2s;}
.cf-btn.active,.cf-btn:hover{background:rgba(240,192,64,0.12);border-color:var(--gold);color:var(--gold);}
#photos-locked-msg{background:rgba(192,57,43,0.08);border:2px solid rgba(192,57,43,0.3);padding:12px;text-align:center;color:rgba(248,170,170,0.7);font-size:11px;line-height:1.6;}
#photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.photo-slot{aspect-ratio:1;background:rgba(255,255,255,0.03);border:2px dashed rgba(240,192,64,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.photo-slot img{width:100%;height:100%;object-fit:cover;}
.photo-slot-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.65);color:#fff;font-size:8px;padding:2px 4px;text-align:center;}
.no-photo{color:rgba(240,192,64,0.25);font-size:10px;font-family:'Press Start 2P',monospace;text-align:center;padding:16px;grid-column:1/-1;}
#refresh-btn{width:100%;padding:9px;background:rgba(41,128,185,0.2);border:2px solid var(--blue);color:#7fc8f8;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;margin-top:6px;}
#refresh-status{font-size:9px;color:#555;text-align:center;margin-top:4px;font-family:'Press Start 2P',monospace;}
#mark-done-btn{width:100%;padding:12px;background:var(--green);border:3px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;}
#mark-done-btn:hover{background:#3d7a35;}
#mark-done-btn.done-state{background:#333;color:#555;border-color:#555;cursor:default;}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:250;display:none;}
#overlay.show{display:block;}

#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--gold);color:var(--dark);font-family:'Press Start 2P',monospace;font-size:9px;padding:10px 18px;border:3px solid var(--dark);opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#stats-bar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--panel);border:2px solid var(--gold);padding:6px 16px;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);z-index:200;white-space:nowrap;}

#map-index{position:fixed;top:60px;left:12px;background:var(--panel);border:var(--border);padding:10px;z-index:200;max-height:calc(100vh - 140px);overflow-y:auto;width:170px;}
#map-index h3{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);margin-bottom:8px;}
.iitem{display:flex;align-items:center;gap:6px;padding:5px 3px;border-bottom:1px solid rgba(240,192,64,0.08);cursor:default;}
.iitem.done{cursor:pointer;}.iitem.done:hover{background:rgba(240,192,64,0.06);}
.inum{font-family:'Press Start 2P',monospace;font-size:7px;min-width:18px;}
.inum.locked{color:#333;}.inum.lit{color:#4caf50;}
.iname{font-size:10px;line-height:1.3;flex:1;}
.iname.locked{color:#333;}.iname.lit{color:#4caf50;}
.icheck{font-size:10px;}

#unlock-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:800;display:none;align-items:center;justify-content:center;}
#unlock-overlay.show{display:flex;}
#unlock-box{background:#1a1005;border:4px solid var(--gold);padding:28px 22px;width:92%;max-width:360px;text-align:center;}
#unlock-emoji{font-size:52px;margin-bottom:10px;animation:bounce 0.6s ease;}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
#unlock-stage{font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(240,192,64,0.6);margin-bottom:6px;}
#unlock-name{font-size:22px;font-weight:900;color:var(--gold);margin-bottom:4px;}
#unlock-loc{font-size:13px;color:#c8a87a;margin-bottom:16px;}
#unlock-task-label{font-family:'Press Start 2P',monospace;font-size:7px;color:#4caf50;margin-bottom:8px;letter-spacing:1px;}
#unlock-task{font-size:13px;color:#c8e6c9;line-height:1.7;white-space:pre-line;background:rgba(45,90,39,0.2);border:2px solid #4caf50;padding:12px;margin-bottom:18px;text-align:left;}
#unlock-close{width:100%;padding:12px;background:var(--green);border:3px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;}
#unlock-close:hover{background:#3d7a35;}

/* FULL BRIGHT overlay when all done */
#allclear-overlay{position:fixed;inset:0;background:rgba(240,192,64,0);z-index:850;display:none;align-items:center;justify-content:center;transition:background 1s ease;}
#allclear-overlay.show{display:flex;background:rgba(0,0,0,0.85);}
#allclear-box{background:#1a1005;border:4px solid var(--gold);padding:32px;width:92%;max-width:380px;text-align:center;}
#allclear-box h1{font-size:28px;font-weight:900;color:var(--gold);margin-bottom:12px;}
#allclear-box p{font-size:14px;color:var(--cream);line-height:1.8;margin-bottom:20px;}
#allclear-close{width:100%;padding:12px;background:var(--green);border:3px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;}

#settings-modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:900;display:none;align-items:center;justify-content:center;}
#settings-modal.show{display:flex;}
#settings-box{background:#1a1005;border:3px solid var(--gold);padding:22px;width:92%;max-width:420px;max-height:88vh;overflow-y:auto;}
#settings-box h2{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-bottom:14px;}
#settings-box label{display:block;font-size:12px;color:var(--cream);margin-bottom:4px;margin-top:12px;}
#settings-box input{width:100%;padding:8px;background:#111;border:2px solid var(--gold);color:var(--cream);font-size:12px;font-family:monospace;}
.hint{font-size:10px;color:#666;margin-top:4px;line-height:1.5;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(240,192,64,0.15);margin-top:10px;}
.toggle-label{font-size:12px;color:var(--cream);}.toggle-sub{font-size:10px;color:#666;margin-top:2px;}
.tog{width:44px;height:24px;background:#333;border:2px solid #555;border-radius:12px;cursor:pointer;position:relative;transition:background 0.3s;flex-shrink:0;}
.tog.on{background:var(--green);border-color:#4caf50;}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:white;border-radius:50%;transition:left 0.3s;}
.tog.on::after{left:22px;}
#settings-save{margin-top:14px;width:100%;padding:11px;background:var(--green);border:3px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;}
#settings-cancel{margin-top:7px;width:100%;padding:9px;background:transparent;border:2px solid #444;color:#666;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;}

#memoir-btn{position:fixed;bottom:14px;right:12px;background:var(--brown);border:3px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:7px;padding:9px 12px;cursor:pointer;z-index:200;}
#memoir-modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:900;display:none;align-items:center;justify-content:center;}
#memoir-modal.show{display:flex;}
#memoir-box{background:#1a1005;border:3px solid var(--gold);padding:22px;width:92%;max-width:380px;}
#memoir-box h2{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);margin-bottom:14px;}
#memoir-box label{display:block;font-size:12px;color:var(--cream);margin-bottom:4px;margin-top:10px;}
#memoir-box select{width:100%;padding:8px;background:#111;border:2px solid var(--gold);color:var(--cream);font-size:13px;}
#memoir-status{font-size:11px;color:#888;margin-top:10px;text-align:center;line-height:1.6;}
#memoir-generate{margin-top:14px;width:100%;padding:12px;background:var(--brown);border:3px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;}
#memoir-cancel{margin-top:7px;width:100%;padding:9px;background:transparent;border:2px solid #444;color:#666;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;}

/* demo panel removed for production */

@media(max-width:600px){#side-panel{width:100%;}#map-index{display:none;}}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#111;}::-webkit-scrollbar-thumb{background:var(--gold);}
</style>
</head>

  <div id="progress-bar"></div>
  <button onclick="showRiddlePage()" style="background:transparent;border:2px solid var(--gold);color:var(--gold);font-size:11px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;" title="謎語清單">📋</button>

// ══════════════════════════
// MAP & CANVAS
// ══════════════════════════
const mapWrapper=document.getElementById('map-wrapper');
const mapContainer=document.getElementById('map-container');
const mapImg=document.getElementById('campus-map');
const canvas=document.getElementById('mask-canvas');
const ctx=canvas.getContext('2d');
let imgW=1792,imgH=1344;
let scale=1,minScale=0.4,maxScale=3,panX=0,panY=0;
let isPanning=false,startX,startY,startPanX,startPanY,lastDist=0;
let allClear=false;

function applyTransform(){mapContainer.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;}

function drawMask(){
  canvas.width=imgW; canvas.height=imgH;

  // Check all clear
  const unlockedCount=stages.filter(s=>getState(s.id)!=='locked').length;
  if(unlockedCount===stages.length && !allClear){
    // Fade out mask entirely
    ctx.clearRect(0,0,imgW,imgH);
    return;
  }
  if(unlockedCount===stages.length){
    ctx.clearRect(0,0,imgW,imgH);
    return;
  }

  // Fill all black
  ctx.fillStyle='rgba(0,0,0,0.93)';
  ctx.fillRect(0,0,imgW,imgH);

  // Cut rectangular holes for unlocked stages
  ctx.globalCompositeOperation='destination-out';
  stages.forEach(s=>{
    if(getState(s.id)==='locked') return;
    const x=s.x1/100*imgW;
    const y=s.y1/100*imgH;
    const w=(s.x2-s.x1)/100*imgW;
    const h=(s.y2-s.y1)/100*imgH;

    // Soft gradient rect hole
    const pad=30; // feather padding
    const grad=ctx.createRadialGradient(
      x+w/2, y+h/2, 0,
      x+w/2, y+h/2, Math.max(w,h)*0.7
    );
    grad.addColorStop(0,'rgba(0,0,0,1)');
    grad.addColorStop(0.7,'rgba(0,0,0,0.98)');
    grad.addColorStop(1,'rgba(0,0,0,0)');

    // Draw solid rect center
    ctx.fillStyle='rgba(0,0,0,1)';
    ctx.fillRect(x+pad, y+pad, w-pad*2, h-pad*2);

    // Draw feathered edges
    ctx.fillStyle=grad;
    ctx.fillRect(x-pad, y-pad, w+pad*2, h+pad*2);
  });

  ctx.globalCompositeOperation='source-over';

  // Draw colored borders on unlocked zones
  stages.forEach(s=>{
    if(getState(s.id)==='locked') return;
    const x=s.x1/100*imgW;
    const y=s.y1/100*imgH;
    const w=(s.x2-s.x1)/100*imgW;
    const h=(s.y2-s.y1)/100*imgH;
    const st=getState(s.id);
    ctx.strokeStyle=st==='done'?'rgba(76,175,80,0.9)':'rgba(240,192,64,0.85)';
    ctx.lineWidth=4;
    ctx.shadowColor=st==='done'?'#4caf50':'#f0c040';
    ctx.shadowBlur=18;
    ctx.strokeRect(x+2, y+2, w-4, h-4);
    ctx.shadowBlur=0;
  });
}

function initMap(){
  imgW=mapImg.naturalWidth||1792;
  imgH=mapImg.naturalHeight||1344;
  mapImg.style.width=imgW+'px'; mapImg.style.height=imgH+'px';
  canvas.style.width=imgW+'px'; canvas.style.height=imgH+'px';
  canvas.style.position='absolute'; canvas.style.top='0'; canvas.style.left='0';
  canvas.style.zIndex='2'; canvas.style.pointerEvents='none';
  const ww=mapWrapper.clientWidth,wh=mapWrapper.clientHeight;
  scale=Math.min(ww/imgW,wh/imgH)*0.95; minScale=scale*0.5;
  panX=(ww-imgW*scale)/2; panY=(wh-imgH*scale)/2;
  applyTransform();
  createHitZones();
  drawMask();
  renderIndex();renderProgress();updateStats();
  // restore existing unlocked states
  stages.forEach(s=>{if(getState(s.id)!=='locked')updateHitZone(s.id);});
}
mapImg.onload=initMap;
if(mapImg.complete)setTimeout(initMap,100);

// Pan & zoom
mapWrapper.addEventListener('mousedown',e=>{if(e.target.closest('.hit-zone'))return;isPanning=true;startX=e.clientX;startY=e.clientY;startPanX=panX;startPanY=panY;mapContainer.classList.add('grabbing');});
window.addEventListener('mousemove',e=>{if(!isPanning)return;panX=startPanX+(e.clientX-startX);panY=startPanY+(e.clientY-startY);applyTransform();});
window.addEventListener('mouseup',()=>{isPanning=false;mapContainer.classList.remove('grabbing');});
mapWrapper.addEventListener('wheel',e=>{e.preventDefault();const r=mapWrapper.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const d=e.deltaY>0?0.9:1.1;const ns=Math.min(maxScale,Math.max(minScale,scale*d));panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);scale=ns;applyTransform();},{passive:false});
let touches=[];
mapWrapper.addEventListener('touchstart',e=>{touches=[...e.touches];if(touches.length===1){isPanning=true;startX=touches[0].clientX;startY=touches[0].clientY;startPanX=panX;startPanY=panY;}if(touches.length===2){isPanning=false;lastDist=Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY);}},{passive:true});
mapWrapper.addEventListener('touchmove',e=>{if(e.touches.length===1&&isPanning){panX=startPanX+(e.touches[0].clientX-startX);panY=startPanY+(e.touches[0].clientY-startY);applyTransform();}if(e.touches.length===2){const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const r=mapWrapper.getBoundingClientRect();const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;const ns=Math.min(maxScale,Math.max(minScale,scale*(dist/lastDist)));panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);scale=ns;lastDist=dist;applyTransform();}},{passive:true});
mapWrapper.addEventListener('touchend',()=>{isPanning=false;});

// ══════════════════════════
// HIT ZONES
// ══════════════════════════
function createHitZones(){
  stages.forEach(s=>{
    const el=document.createElement('div');
    el.className='hit-zone'; el.dataset.id=s.id;
    const x=s.x1/100*imgW, y=s.y1/100*imgH;
    const w=(s.x2-s.x1)/100*imgW, h=(s.y2-s.y1)/100*imgH;
    el.style.left=x+'px'; el.style.top=y+'px';
    el.style.width=w+'px'; el.style.height=h+'px';
    el.addEventListener('click',()=>{if(getState(s.id)!=='locked')openPanel(s.id);});
    mapContainer.appendChild(el);
  });
}
function updateHitZone(id){
  const el=mapContainer.querySelector(`.hit-zone[data-id="${id}"]`);
  if(!el)return;
  const st=getState(id);
  el.className='hit-zone'+(st!=='locked'?' '+st:'');
}

// ══════════════════════════
// UNLOCK
// ══════════════════════════
function activateZone(id,isNew){
  updateHitZone(id);
  drawMask();
  // Check all clear
  if(getDoneCount()===stages.length){
    setTimeout(triggerAllClear, 800);
  }
}

function triggerAllClear(){
  allClear=true;
  // Animate mask fading out
  let alpha=0.93;
  const fade=setInterval(()=>{
    alpha=Math.max(0,alpha-0.04);
    ctx.clearRect(0,0,imgW,imgH);
    if(alpha>0){
      ctx.fillStyle=`rgba(0,0,0,${alpha})`;
      ctx.fillRect(0,0,imgW,imgH);
    }
    if(alpha<=0){
      clearInterval(fade);
      ctx.clearRect(0,0,imgW,imgH);
    }
  },30);
  setTimeout(()=>{
    document.getElementById('allclear-overlay').classList.add('show');
  },1200);
}

function checkUrlUnlock(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('unlock');if(!code)return;
  const s=stages.find(x=>x.unlockCode===code.toUpperCase());if(!s)return;
  if(getState(s.id)==='locked'){
    setState(s.id,'unlocked');
    activateZone(s.id,true);
    renderIndex();renderProgress();updateStats();
    setTimeout(()=>showUnlockCelebration(s),400);
  }
  window.history.replaceState({},'',window.location.pathname);
}

function showUnlockCelebration(s){
  document.getElementById('unlock-stage').textContent=`STAGE ${String(s.id).padStart(2,'0')} 點亮！`;
  document.getElementById('unlock-name').textContent=s.name;
  document.getElementById('unlock-loc').textContent=`📍 ${s.location}`;
  document.getElementById('unlock-task').textContent=s.task;
  document.getElementById('unlock-overlay').classList.add('show');
}
function closeUnlockOverlay(){document.getElementById('unlock-overlay').classList.remove('show');}

function openPanel(id){
  const s=stages.find(x=>x.id===id);if(!s||getState(id)==='locked')return;
  activeStage=id;activeClass='all';
  document.getElementById('panel-stage').textContent=`STAGE ${String(id).padStart(2,'0')} / 12`;
  document.getElementById('panel-title').textContent=s.name;
  document.getElementById('panel-location').textContent=`📍 ${s.location}`;
  document.getElementById('panel-task').textContent=s.task;
  document.getElementById('panel-theme').textContent=s.theme;
  document.getElementById('panel-riddle').textContent=`「${s.riddle}」`;
  const st=getState(id);
  const btn=document.getElementById('mark-done-btn');
  if(st==='done'){btn.textContent='✅ 已完成此關！';btn.className='done-state';}
  else{btn.textContent='✓ 標記完成此關';btn.className='';}
  if(photosOpen){
    document.getElementById('photos-locked-msg').style.display='none';
    document.getElementById('photos-open-section').style.display='block';
    buildClassFilter(id);renderPhotoGrid(id,'all');loadPhotos(id,'all');
  }else{
    document.getElementById('photos-locked-msg').style.display='block';
    document.getElementById('photos-open-section').style.display='none';
  }
  centerOn(s);
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closePanel(){
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  activeStage=null;
}
function centerOn(s){
  const cx=(s.x1+s.x2)/2/100*imgW;
  const cy=(s.y1+s.y2)/2/100*imgH;
  const ww=mapWrapper.clientWidth,wh=mapWrapper.clientHeight;
  panX=ww/2-(cx*scale); panY=wh/2-(cy*scale); applyTransform();
}
function markDone(){
  if(!activeStage||getState(activeStage)==='done')return;
  setState(activeStage,'done');
  drawMask(); updateHitZone(activeStage);
  document.getElementById('mark-done-btn').textContent='✅ 已完成此關！';
  document.getElementById('mark-done-btn').className='done-state';
  renderIndex();renderProgress();updateStats();
  showToast(`🎉 第 ${activeStage} 關完成！`);
  if(getDoneCount()===stages.length) setTimeout(triggerAllClear,500);
}

function buildClassFilter(id){
  const cf=document.getElementById('class-filter');cf.innerHTML='';
  ['all',...CLASSES].forEach(c=>{
    const btn=document.createElement('button');
    btn.className='cf-btn'+(c==='all'?' active':'');
    btn.textContent=c==='all'?'全部':c+'班';
    btn.onclick=()=>{activeClass=c;cf.querySelectorAll('.cf-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderPhotoGrid(id,c);loadPhotos(id,c);};
    cf.appendChild(btn);
  });
}
function renderPhotoGrid(sid,cf){
  const grid=document.getElementById('photo-grid');grid.innerHTML='';
  const cached=(photoCache[sid]||[]).filter(p=>cf==='all'||p.group.startsWith(cf+'-')||p.group===cf);
  if(!cached.length){const e=document.createElement('div');e.className='no-photo';e.textContent='暫無照片';grid.appendChild(e);return;}
  cached.forEach(p=>{
    const slot=document.createElement('div');slot.className='photo-slot';
    const img=document.createElement('img');img.src=p.url;img.alt=p.group;
    img.onerror=()=>{slot.innerHTML='<div style="font-size:18px">❌</div>';};
    const lbl=document.createElement('div');lbl.className='photo-slot-label';lbl.textContent=p.group;
    slot.appendChild(img);slot.appendChild(lbl);grid.appendChild(slot);
  });
}
async function loadPhotos(sid,cf){
  document.getElementById('refresh-status').textContent='⏳ 載入中...';
  try{
    const s=stages.find(x=>x.id===sid);
    const gid=s&&s.sheetGid?s.sheetGid:'';
    const apiUrl='https://script.google.com/macros/s/AKfycbwNp_h9oPDw99jB-X-F1mIhUKQToe-76QUHDW518fL1hR9a4P430a9cz6I8FC0VHmCP/exec?gid='+gid;
    const res=await fetch(apiUrl);
    if(!res.ok) throw new Error('API failed');
    const data=await res.json();
    const all=data.map(r=>{
      const group=r.cls&&r.grp?r.cls+'-'+r.grp:r.cls||r.grp||'未知';
      const url=convertDrive(r.url);
      return {group,url};
    }).filter(r=>r.url);
    photoCache[sid]=all;renderPhotoGrid(sid,cf||activeClass);
    document.getElementById('refresh-status').textContent=`✓ ${new Date().toLocaleTimeString('zh-TW')} (${all.length}張)`;
  }catch(e){document.getElementById('refresh-status').textContent='❌ 載入失敗: '+e.message;}
}
function parseCSV(row){const r=[];let c='',q=false;for(let i=0;i<row.length;i++){if(row[i]==='"'){q=!q;}else if(row[i]===','&&!q){r.push(c);c='';}else{c+=row[i];}}r.push(c);return r;}
function convertDrive(url){
  if(!url) return url;
  // Format: /file/d/FILE_ID/
  const m1=url.match(/\/file\/d\/([^/]+)/);
  if(m1) return `https://drive.google.com/uc?export=view&id=${m1[1]}`;
  // Format: open?id=FILE_ID
  const m2=url.match(/[?&]id=([^&]+)/);
  if(m2) return `https://drive.google.com/uc?export=view&id=${m2[1]}`;
  return url;
}
function startAutoRefresh(){if(autoTimer)clearInterval(autoTimer);if(!sheetUrl||!photosOpen)return;autoTimer=setInterval(()=>{if(activeStage&&photosOpen)loadPhotos(activeStage,activeClass);},refreshInterval*1000);}

async function generateMemoir(){
  const cls=document.getElementById('memoir-class').value; // e.g. "307" or "all"
  const grp=document.getElementById('memoir-group').value; // e.g. "5" or "all"
  const statusEl=document.getElementById('memoir-status');
  statusEl.textContent='⏳ 生成中，正在抓取各關照片...';
  const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwNp_h9oPDw99jB-X-F1mIhUKQToe-76QUHDW518fL1hR9a4P430a9cz6I8FC0VHmCP/exec';
  try{
    const all=[];
    // 並行抓取全部12關
    await Promise.all(stages.map(async s=>{
      try{
        const apiUrl=APPS_SCRIPT_URL+(s.sheetGid?'?gid='+s.sheetGid:'');
        const res=await fetch(apiUrl);
        if(!res.ok)return;
        const data=await res.json();
        data.forEach(r=>{
          // group 格式：r.cls = "307", r.grp = "第5組"
          // 合成 "307-第5組"
          const group=r.cls&&r.grp?r.cls+'-'+r.grp:r.cls||r.grp||'未知';
          const photoUrl=convertDrive(r.url);
          if(photoUrl) all.push({group,stage:s.id,url:photoUrl});
        });
      }catch(e){/* 某關失敗跳過 */}
    }));

    // 篩選：cls="307" 匹配 group.startsWith("307-")
    //       grp="5"   匹配 group.includes("第5組")
    const filtered=all.filter(p=>{
      const clsOk=(cls==='all'||p.group.startsWith(cls+'-')||p.group===cls);
      const grpOk=(grp==='all'||p.group.includes('第'+grp+'組'));
      return clsOk&&grpOk;
    });

    const label=cls==='all'?'全年級':(cls+'班'+(grp==='all'?'':'第'+grp+'組'));
    const sm={};filtered.forEach(p=>{if(!sm[p.stage])sm[p.stage]=[];sm[p.stage].push(p);});

    // thumbnail 轉換函數（內嵌在紀念冊裡）

      if(!url)return url;
      const m=url.match(/id=([a-zA-Z0-9_-]+)/)||url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if(m)return'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';
      return url;
    }

    const secs=stages.map(s=>{
      const ps=sm[s.id]||[];
      const imgs=ps.map(p=>`<div class="photo-item"><img src="${toThumb(p.url)}" loading="lazy" onerror="this.parentNode.style.display='none'"><div class="photo-lbl">${p.group}</div></div>`).join('');
      return`<div class="stage-block"><div class="stage-hd"><span class="stage-num">${String(s.id).padStart(2,'0')}</span><div><div class="stage-name">${s.name}</div><div class="stage-loc">📍 ${s.location}</div></div></div>${ps.length?`<div class="photo-grid">${imgs}</div>`:'<div class="no-photo">此關尚無照片</div>'}</div>`;
    }).join('');

    const html=`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">
<title>慧燈畢業巡禮紀念冊-${label}</title>

    statusEl.textContent=`✓ 已生成 ${filtered.length} 張照片`;
  }catch(e){statusEl.textContent='❌ 錯誤: '+e.message;}
}

// ══════════════════════════
// INDEX & PROGRESS
// ══════════════════════════
function renderIndex(){
  const list=document.getElementById('index-list');list.innerHTML='';
  stages.forEach(s=>{
    const st=getState(s.id);
    const item=document.createElement('div');item.className='iitem'+(st!=='locked'?' done':'');
    item.innerHTML=`<span class="inum ${st==='locked'?'locked':'lit'}">${String(s.id).padStart(2,'0')}</span><span class="iname ${st==='locked'?'locked':'lit'}">${st==='locked'?'???':s.location}</span><span class="icheck">${st==='done'?'✅':st==='unlocked'?'🔦':'🔒'}</span>`;
    if(st!=='locked')item.addEventListener('click',()=>openPanel(s.id));
    list.appendChild(item);
  });
}
function renderProgress(){
  const bar=document.getElementById('progress-bar');bar.innerHTML='';
  stages.forEach(s=>{const d=document.createElement('div');d.className='pdot'+(getState(s.id)!=='locked'?' done':'');d.title=getState(s.id)!=='locked'?s.location:'???';bar.appendChild(d);});
}
function updateStats(){document.getElementById('stats-count').textContent=getDoneCount();}

function demoUnlockAll(){
  stages.forEach(s=>{if(getState(s.id)==='locked'){setState(s.id,'unlocked');}});
  stages.forEach(s=>updateHitZone(s.id));
  setTimeout(triggerAllClear,500);
  renderIndex();renderProgress();updateStats();showToast('⚡ 全部關卡已點亮！');
}
function resetAll(){
  stageState={};allClear=false;localStorage.removeItem('hl_final1');
  stages.forEach(s=>{const el=mapContainer.querySelector(`.hit-zone[data-id="${s.id}"]`);if(el)el.className='hit-zone';});
  drawMask();renderIndex();renderProgress();updateStats();closePanel();showToast('↺ 已重置所有進度');
}

function goUpload(){
  const s=stages.find(x=>x.id===activeStage);
  if(!s||!s.formUrl) return;
  window.open(s.formUrl,'_blank');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();document.getElementById('unlock-overlay').classList.remove('show');}});

// ══════════════════════════
// RIDDLE PAGE
// ══════════════════════════
function buildRiddlePage(){
  const list=document.getElementById('riddle-list');
  list.innerHTML='';
  stages.forEach(s=>{
    const st=getState(s.id);
    const card=document.createElement('div');
    card.style.cssText=`
      background:${st!=='locked'?'rgba(76,175,80,0.08)':'rgba(240,192,64,0.04)'};
      border:2px solid ${st!=='locked'?'rgba(76,175,80,0.5)':'rgba(240,192,64,0.15)'};
      border-left:5px solid ${st!=='locked'?'#4caf50':'var(--gold)'};
      padding:10px 12px;border-radius:3px;
    `;
    card.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
        <span style="font-family:'Press Start 2P',monospace;font-size:7px;color:${st!=='locked'?'#4caf50':'var(--gold)'};min-width:22px;">${String(s.id).padStart(2,'0')}</span>
        <span style="font-size:13px;font-weight:900;color:${st!=='locked'?'#4caf50':'var(--cream)'};">${s.name}</span>
        <span style="margin-left:auto;font-size:12px;">${st==='done'?'✅':st==='unlocked'?'🔓':'🔒'}</span>
      </div>
      <div style="font-size:12px;color:${st!=='locked'?'rgba(200,230,200,0.8)':'rgba(253,246,227,0.55)'};font-style:italic;line-height:1.6;padding-left:30px;">「${s.riddle}」</div>
    `;
    list.appendChild(card);
  });
}

function enterMap(){
  document.getElementById('riddle-page').style.display='none';
}

function showRiddlePage(){
  buildRiddlePage();
  document.getElementById('riddle-page').style.display='flex';
}

renderProgress();renderIndex();updateStats();startAutoRefresh();
// Build riddle page on load
buildRiddlePage();
checkUrlUnlock();
</script>
</body>
</html>
